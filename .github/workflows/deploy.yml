name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production-seguros2
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}

    steps:
      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for secret_name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_KEY; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::Missing required GitHub secret: ${secret_name}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail

          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -p "$VPS_PORT" -H "$VPS_HOST" > ~/.ssh/known_hosts.tmp
          if [ ! -s ~/.ssh/known_hosts.tmp ]; then
            echo "::error::ssh-keyscan returned no host keys for ${VPS_HOST}:${VPS_PORT}"
            exit 1
          fi
          cat ~/.ssh/known_hosts.tmp >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run remote deploy script
        shell: bash
        run: |
          set -euo pipefail

          ssh \
            -i ~/.ssh/deploy_key \
            -p "$VPS_PORT" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "$VPS_USER@$VPS_HOST" \
            "/usr/local/bin/deploy-seguros2.sh"
