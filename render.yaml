services:
  - type: web
    name: seguros2
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    preDeployCommand: npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    initialDeployHook: npm run prisma:seed
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: seguros2-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: VITE_DEBUG
        value: "false"
      - key: ADMIN_EMAIL
        value: admin@segurostimbues.com.ar
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

databases:
  - name: seguros2-db
    plan: free
